name: Check frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.lock'
      - '**.rs'
      - '**.toml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.lock'
      - '**.rs'
      - '**.toml'

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  tsc-eslint-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: 'pnpm'

      - name: Install modules
        run: pnpm install

      - name: Run build
        run: pnpm build

      - name: Run ESLint
        run: pnpm eslint ./src ./ext/**/*.ts
